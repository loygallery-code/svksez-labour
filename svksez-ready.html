async function initSB(){
  S.wForm=newWForm("new");
  if(SUPABASE_URL==="https://befljecxdniparqnrcgg.supabase.co"){S.view="setup";render();return;}
  try{
    sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    await loadAll();
    S.view="login";render();
  }catch(e){S.view="setup";render();}
}
async function loadAll(){
  const[{data:cos},{data:recs},{data:wks},{data:pend}]=await Promise.all([
    sb.from("companies").select("*"),
    sb.from("records").select("*").order("date",{ascending:false}),
    sb.from("workers").select("*").order("created_at",{ascending:false}),
    sb.from("contact_changes").select("*").eq("approved",false)
  ]);
  S.companies={};(cos||[]).forEach(c=>S.companies[c.code]=c);
  S.records=recs||[];S.workers=wks||[];S.pendingContactChanges=pend||[];
}

  if(S.view==="login"){app.innerHTML=buildLogin();bindLogin();return;}
  if(S.view==="company"){app.innerHTML=buildCompany();bindCompany();return;}
  if(S.view==="admin"){app.innerHTML=buildAdmin();bindAdmin();return;}
  if(S.view==="print"){doPrint();return;}
}

    <div style="font-size:42px">🏭</div>

  ${S.msg?'<div class="alert alert-ok">'+S.msg+'</div>':""}
  ${S.loginTab==="company"?`

    <div class="card-title">🏭 ເຂົ້າສູ່ລະບົບ (ບໍລິສັດ)</div>

      <input id="li-u" list="co-l" value="${S.loginInput}" placeholder="SVKSEZ-A001">

      <input type="password" id="li-pw" value="${S.loginPw}" placeholder="ລະຫັດຜ່ານ..."></div>
    <button class="btn-blue" id="btn-cl" style="width:100%;padding:11px;font-size:14px">ເຂົ້າສູ່ລະບົບ</button>
    <div style="text-align:center;font-size:11px;color:#94a3b8;margin-top:10px">ລະຫັດຜ່ານໄດ້ຮັບຈາກເຈົ້າໜ້າທີ່ SVKSEZ</div>
  </div>`:`
  <div class="card">
    <div class="card-title">🔐 ແອດມິນ</div>
    <div class="row"><div class="label">ລະຫັດຜ່ານ</div>
      <input type="password" id="li-ap" value="${S.adminPw}" placeholder="ລະຫັດຜ່ານແອດມິນ..."></div>

function bindLogin(){
  const $=id=>document.getElementById(id);
  const ltco=$("lt-co");if(ltco)ltco.onclick=()=>{S.loginTab="company";S.error="";render();};
  const ltad=$("lt-ad");if(ltad)ltad.onclick=()=>{S.loginTab="admin";S.error="";render();};
  const lu=$("li-u");if(lu)lu.oninput=e=>S.loginInput=e.target.value;
  const lpw=$("li-pw");if(lpw){lpw.oninput=e=>S.loginPw=e.target.value;lpw.onkeydown=e=>{if(e.key==="Enter")doCoLogin();};}
  const lap=$("li-ap");if(lap){lap.oninput=e=>S.adminPw=e.target.value;lap.onkeydown=e=>{if(e.key==="Enter")doAdminLogin();};}
  const bcl=$("btn-cl");if(bcl)bcl.onclick=doCoLogin;
  const bal=$("btn-al");if(bal)bal.onclick=doAdminLogin;
}
function doCoLogin(){
  const v=S.loginInput.trim(),pw=(S.loginPw||"").trim();
  if(!v){S.error="ກະລຸນາໃສ່ Username";render();return;}
  if(!pw){S.error="ກະລຸນາໃສ່ລະຫັດຜ່ານ";render();return;}
  const found=Object.values(S.companies).find(c=>c.code===v);
  if(!found){S.error="ບໍ່ພົບ Username ກະລຸນາຕິດຕໍ່ເຈົ້າໜ້າທີ່";render();return;}
  if(found.password!==pw){S.error="ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ";render();return;}
  S.companyCode=found.code;S.view="company";S.error="";S.loginPw="";
  S.companyTab="info";initForm();render();
}
function doAdminLogin(){
  if(S.adminPw===ADMIN_PW){S.view="admin";S.error="";render();}
  else{S.error="ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ";render();}
}

function buildHistory(myRecs){
  if(!myRecs.length)return'<div style="text-align:center;padding:2.5rem;color:#94a3b8">ຍັງບໍ່ມີຂໍ້ມູນ</div>';
  return myRecs.map((r,i)=>{
    const prev=myRecs[i+1];const diff=prev?r.grand_total-prev.grand_total:null;
    const badge=diff===null?'':diff>0?'<span class="badge badge-g">+'+diff+' ຮັບໃໝ່</span>':diff<0?'<span class="badge badge-r">'+diff+' ອອກ</span>':'<span class="badge badge-gr">ບໍ່ປ່ຽນ</span>';
    return`<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
        <span style="font-weight:700;font-size:13px">${r.date}</span>${badge}
      </div>
      <div class="grid3" style="margin-bottom:8px">
        <div class="stat"><div class="stat-lbl">ລາວຊາຍ</div><div class="stat-val" style="font-size:16px">${r.lao_male}</div></div>
        <div class="stat"><div class="stat-lbl">ລາວຍິງ</div><div class="stat-val" style="font-size:16px">${r.lao_female}</div></div>
        <div class="stat"><div class="stat-lbl">ລາວລວມ</div><div class="stat-val" style="font-size:16px;color:#2563eb">${r.lao_total}</div></div>
      </div>
      <div class="grid3">
        <div class="stat"><div class="stat-lbl">ຕ.ປ</div><div class="stat-val" style="font-size:16px;color:#d97706">${r.foreign_total}</div></div>
        <div class="stat"><div class="stat-lbl">ລວມ</div><div class="stat-val" style="font-size:16px;color:#16a34a">${r.grand_total}</div></div>
        <div style="font-size:11px;color:#94a3b8;padding:4px">${(r.foreign_rows||[]).map(f=>f.nationality+":"+f.total).join(", ")}</div>
      </div>
    </div>`;
  }).join("");
}

function bindCompany(){
  const $=id=>document.getElementById(id);
  $("btn-out").onclick=()=>{S.view="login";S.companyCode=null;render();};
  const ci=$("ct-info");if(ci)ci.onclick=()=>{S.companyTab="info";render();};
  const cf=$("ct-form");if(cf)cf.onclick=()=>{S.companyTab="form";render();};
  const ch=$("ct-hist");if(ch)ch.onclick=()=>{S.companyTab="hist";render();};

  if(S.companyTab==="form"){
    const f=S.form;
    if(!f)return;
    // Contact change request
    const brc=$("btn-req-change");
    if(brc)brc.onclick=async()=>{
      const np=prompt("ຄຳນຳໜ້າໃໝ່ (ທ້າວ/ນາງ):");const nf=prompt("ຊື່ໃໝ່:");const nl=prompt("ນາມສະກຸນໃໝ່:");
      if(!nf||!nl)return;
      await sb.from("contact_changes").insert({id:Date.now().toString(),company_code:S.companyCode,new_prefix:np,new_first:nf,new_last:nl,new_role:f.role,approved:false});
      alert("✅ ສົ່ງຄຳຂໍປ່ຽນແລ້ວ ລໍຖ້າແອດມິນອະນຸມັດ");
    };
    if(!f.contactLocked){
      document.querySelectorAll(".pfx").forEach(b=>b.onclick=()=>{S.form.prefix=b.dataset.p;render();});
      document.querySelectorAll(".role-btn").forEach(b=>b.onclick=()=>{S.form.role=b.dataset.r;render();});
      const fn=$("f-fn");if(fn)fn.oninput=e=>S.form.firstName=e.target.value;
      const ln=$("f-ln");if(ln)ln.oninput=e=>S.form.lastName=e.target.value;
      const ro=$("f-ro");if(ro)ro.oninput=e=>S.form.roleOther=e.target.value;
    }
    const lm=$("f-lm");if(lm)lm.oninput=e=>{S.form.laoMale=e.target.value;render();};
    const lf=$("f-lf");if(lf)lf.oninput=e=>{S.form.laoFemale=e.target.value;render();};
    document.querySelectorAll(".ns").forEach(s=>s.onchange=e=>{S.form.foreignRows[+s.dataset.i].nationality=e.target.value;});
    document.querySelectorAll(".nm").forEach(x=>x.oninput=e=>{S.form.foreignRows[+x.dataset.i].male=e.target.value;render();});
    document.querySelectorAll(".nf").forEach(x=>x.oninput=e=>{S.form.foreignRows[+x.dataset.i].female=e.target.value;render();});
    document.querySelectorAll(".dn").forEach(b=>b.onclick=()=>{S.form.foreignRows.splice(+b.dataset.i,1);render();});
    const an=$("btn-an");if(an)an.onclick=()=>{S.form.foreignRows.push({nationality:"ໄທ",male:0,female:0});render();};
    const sv=$("btn-sv");
    if(sv)sv.onclick=async()=>{
      const f=S.form;
      if(!f.contactLocked&&!f.firstName){S.error="ກະລຸນາໃສ່ຊື່ຜູ້ໃຫ້ຂໍ້ມູນ";render();return;}
      sv.disabled=true;sv.textContent="⏳ ກຳລັງສົ່ງ...";
      const laoM=+f.laoMale,laoF=+f.laoFemale;
      const fRows=f.foreignRows.map(r=>({...r,male:+r.male,female:+r.female,total:+r.male+ +r.female}));
      const fTotal=fRows.reduce((s,r)=>s+r.total,0);
      const co=S.companies[S.companyCode];
      const rec={id:Date.now().toString(),company_code:S.companyCode,company_name:co?.name,zone:co?.zone,
        date:today(),contact_prefix:f.prefix,contact_first:f.firstName,contact_last:f.lastName,
        role:f.role==="ອື່ນໆ"?f.roleOther:f.role,
        lao_male:laoM,lao_female:laoF,lao_total:laoM+laoF,
        foreign_rows:fRows,foreign_total:fTotal,grand_total:laoM+laoF+fTotal};
      const{error}=await sb.from("records").insert(rec);
      if(error){sv.disabled=false;sv.textContent="☁️ ບັນທຶກ ແລະ ສົ່ງຂໍ້ມູນ";S.error="ສົ່ງລົ້ມເຫຼວ:"+error.message;render();return;}
      S.records.unshift(rec);S.form.contactLocked=true;S.saved=true;S.error="";render();
      setTimeout(()=>{S.saved=false;render();},4000);
    };
  }
}

function buildAdminMonthly(){
  const now=new Date(),yr=now.getFullYear();
  const byMonth={};
  S.records.forEach(r=>{
    const d=new Date(r.date);if(d.getFullYear()!==yr)return;
    const m=d.getMonth();
    if(!byMonth[m])byMonth[m]={};
    if(!byMonth[m][r.company_code]||r.date>byMonth[m][r.company_code].date)byMonth[m][r.company_code]=r;
  });
  // Find new/left by comparing consecutive months
  const monthArr=Object.keys(byMonth).sort().map(k=>({m:+k,recs:Object.values(byMonth[k])}));
  return`<div style="font-size:12px;color:#64748b;margin-bottom:10px">ສ່ວນ B.6 — ລາຍເດືອນ ປີ ${yr}</div>`+
  MONTHS.map((mn,mi)=>{
    const entry=byMonth[mi];
    if(!entry){return"<div style='padding:10px 14px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:9px;display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px'><span style='font-weight:600'>"+mn+"</span><span style='color:#94a3b8'>ຍັງບໍ່ມີ</span></div>";}
    const recs=Object.values(entry);
    const lao=recs.reduce((s,r)=>s+r.lao_total,0),for_=recs.reduce((s,r)=>s+r.foreign_total,0);
    // auto new/leave
    const prevM=byMonth[mi-1];
    let newIn=0,leftOut=0;
    if(prevM){const pTotal=Object.values(prevM).reduce((s,r)=>s+r.grand_total,0);const cTotal=lao+for_;newIn=Math.max(0,cTotal-pTotal);leftOut=Math.max(0,pTotal-cTotal);}
    return"<div class='card' style='margin-bottom:6px'>"
    +"<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:9px'>"
    +"<span style='font-weight:700;font-size:13px'>"+mn+" "+yr+"</span>"
    +"<span style='font-size:12px;color:#64748b'>"+recs.length+" ບໍລິສັດ"+(newIn?" | <span style='color:#15803d'>+"+newIn+" ຮັບໃໝ່</span>":"")+(leftOut?" | <span style='color:#b91c1c'>-"+leftOut+" ອອກ</span>":"")+"</span>"
    +"</div><div class='grid3'>"
    +"<div class='stat'><div class='stat-lbl'>ລາວ</div><div class='stat-val' style='font-size:16px;color:#2563eb'>"+lao+"</div></div>"
    +"<div class='stat'><div class='stat-lbl'>ຕ.ປ</div><div class='stat-val' style='font-size:16px;color:#d97706'>"+for_+"</div></div>"
    +"<div class='stat'><div class='stat-lbl'>ລວມ</div><div class='stat-val' style='font-size:16px;color:#16a34a'>"+(lao+for_)+"</div></div>"
    +"</div></div>";
  }).join("");
}

function buildWorkerList(){
  // C.4 Summary tabs
  const sumTabs=[{id:"month",l:"ລາຍເດືອນ"},{id:"half",l:"6 ເດືອນ"},{id:"year",l:"ລາຍປີ"},{id:"all",l:"ລວມທັງໝົດ"}];
  const typeTabs=[{id:"new",l:"➕ ໃໝ່"},{id:"renew",l:"🔄 ຕໍ່ອາຍຸ"}];
  const workers=S.workers.filter(w=>w.type===S.workerListTab);

  // Group by zone then company
  const byZoneCo={};
  workers.forEach(w=>{
    const k=w.zone+"|"+w.company_name;
    if(!byZoneCo[k])byZoneCo[k]={zone:w.zone,company:w.company_name,workers:[]};
    byZoneCo[k].workers.push(w);
  });

  let listHTML='<div style="font-size:12px;color:#64748b;margin-bottom:8px">C.4 — ສະຫຼຸບ'+workers.length+' ຄົນ | ຍິງ: '+workers.filter(w=>w.gender==="ຍິງ").length+' | ຊາຍ: '+workers.filter(w=>w.gender==="ຊາຍ").length+'</div>';

  Object.entries(byZoneCo).sort().forEach(([k,g])=>{
    const females=g.workers.filter(w=>w.gender==="ຍິງ").sort((a,b)=>a.last_name.localeCompare(b.last_name));
    const males=g.workers.filter(w=>w.gender==="ຊາຍ").sort((a,b)=>a.last_name.localeCompare(b.last_name));
    const sorted=[...females,...males];
    listHTML+="<div class='card' style='margin-bottom:8px'>"
    +"<div style='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px'>"
    +"<div><span style='font-weight:700'>ເຂດ "+g.zone+"</span> — "+g.company+"</div>"
    +"<div style='font-size:12px;color:#64748b'>ລວມ: "+g.workers.length+" | ຍ: "+females.length+" | ຊ: "+males.length+"</div>"
    +"</div>";
    sorted.forEach((w,i)=>{
      const lDays=daysUntil(w.labour_expiry);

      position:f.position,salary:f.salary,dob:f.dob||null,

      visa_no:f.visaNo,visa_issue:f.visaIssue||null,visa_expiry:f.visaExpiry||null,
      stay_duration:f.stayDuration,updated_at:new Date().toISOString()};
    let error;
    if(S.editingWorker){
      ({error}=await sb.from("workers").update(rec).eq("id",S.editingWorker));

    }else{
      rec.created_at=new Date().toISOString();
      ({error}=await sb.from("workers").insert(rec));

  if(!pend.length)return;
  const html=pend.map(p=>`

        <button onclick="rejectContact('${p.id}')" style="flex:1;padding:6px;background:#fee2e2;color:#b91c1c;border-color:#fca5a5;border-radius:6px;cursor:pointer;font-family:inherit">❌ ປະຕິເສດ</button>
      </div>

  modal.innerHTML=`<div class="modal-box"><div style="font-weight:700;margin-bottom:12px">📋 ຄຳຂໍປ່ຽນຜູ້ໃຫ້ຂໍ້ມູນ</div>${html}<button onclick="document.getElementById('pend-modal').remove()" style="width:100%;padding:8px;margin-top:8px">ປິດ</button></div>`;

}
async function approveContact(id,code,prefix,first,last,role){
  await sb.from("contact_changes").update({approved:true}).eq("id",id);
  // Update the latest record's contact info
  const latestRec=S.records.filter(r=>r.company_code===code).sort((a,b)=>b.date.localeCompare(a.date))[0];
  if(latestRec){await sb.from("records").update({contact_prefix:prefix,contact_first:first,contact_last:last,role}).eq("id",latestRec.id);}
  S.pendingContactChanges=S.pendingContactChanges.filter(p=>p.id!==id);
  await loadAll();document.getElementById("pend-modal")?.remove();alert("✅ ອະນຸມັດສຳເລັດ");render();
}
async function rejectContact(id){
  await sb.from("contact_changes").delete().eq("id",id);
  S.pendingContactChanges=S.pendingContactChanges.filter(p=>p.id!==id);
  document.getElementById("pend-modal")?.remove();alert("❌ ປະຕິເສດແລ້ວ");render();
}

function exportCSV(){
  const arr=getLatest();
  const rows=[["ລະຫັດ","ຊື່ (ລາວ)","ຊື່ (EN)","ເຂດ","ວັນທີ","ລາວຊາຍ","ລາວຍິງ","ລາວລວມ","ຕ.ປ.ລວມ","ລວມ"]];
  arr.forEach(r=>{const co=S.companies[r.company_code];rows.push([r.company_code,r.company_name,co?.name_en||"",r.zone,r.date,r.lao_male,r.lao_female,r.lao_total,r.foreign_total,r.grand_total]);});
  const csv="\uFEFF"+rows.map(r=>r.join(",")).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));a.download="SVKSEZ_"+today()+".csv";a.click();
}

function exportXLSX(){
  if(typeof XLSX==="undefined"){alert("ກຳລັງໂຫລດ SheetJS...");return;}
  const wb=XLSX.utils.book_new();
  const now=new Date(),mn=MONTHS[now.getMonth()],yr=now.getFullYear();
  const arr=getLatest();
  const natMap={};
  arr.forEach(r=>(r.foreign_rows||[]).forEach(fr=>{if(!natMap[fr.nationality])natMap[fr.nationality]={male:0,female:0};natMap[fr.nationality].male+=fr.male;natMap[fr.nationality].female+=fr.female;}));
  const lMT=arr.reduce((s,r)=>s+r.lao_male,0),lFT=arr.reduce((s,r)=>s+r.lao_female,0);
  const fMT=arr.reduce((s,r)=>s+(r.foreign_rows||[]).reduce((a,f)=>a+f.male,0),0);
  const fFT=arr.reduce((s,r)=>s+(r.foreign_rows||[]).reduce((a,f)=>a+f.female,0),0);

  // Sheet 1: ສະຫຼຸບ B.5.1
  const s1=[["ສາທາລະນະລັດ ປະຊາທິປະໄຕ ປະຊາຊົນລາວ"],["ສັນຕິພາບ ເອກະລາດ ປະຊາທິປະໄຕ ເອກະພາບ ວັດທະນະຖາວອນ"],[],
    ["ສະຖິຕິແຮງງານລາວ ແລະ ຕ່າງປະເທດ ທີ່ເຮັດວຽກໃນເຂດເສດຖະກິດພິເສດແຂວງສະຫວັນນະເຂດ ປະຈຳເດືອນ "+mn+"/"+yr],[],
    ["ລ/ດ","ລະຫັດ","ຊື່ (ລາວ)","ຊື່ (EN)","ເຂດ","ລາວຊາຍ","ລາວຍິງ","ລາວລວມ","ຕ.ປ.ຊາຍ","ຕ.ປ.ຍິງ","ຕ.ປ.ລວມ","ລວມ"]];
  arr.forEach((r,i)=>{const fM=(r.foreign_rows||[]).reduce((s,f)=>s+f.male,0),fF=(r.foreign_rows||[]).reduce((s,f)=>s+f.female,0);const co=S.companies[r.company_code];s1.push([i+1,r.company_code,r.company_name,co?.name_en||"",r.zone,r.lao_male,r.lao_female,r.lao_total,fM,fF,r.foreign_total,r.grand_total]);});
  s1.push(["","","","","ລວມ",lMT,lFT,lMT+lFT,fMT,fFT,fMT+fFT,lMT+lFT+fMT+fFT]);
  const ws1=XLSX.utils.aoa_to_sheet(s1);ws1["!cols"]=[{wch:5},{wch:14},{wch:26},{wch:22},{wch:7},{wch:9},{wch:9},{wch:9},{wch:9},{wch:9},{wch:9},{wch:12}];
  ws1["!merges"]=[{s:{r:0,c:0},e:{r:0,c:11}},{s:{r:1,c:0},e:{r:1,c:11}},{s:{r:3,c:0},e:{r:3,c:11}}];
  XLSX.utils.book_append_sheet(wb,ws1,"B.5.1 ສະຫຼຸບລວມ");

  // Sheet 2: B.5.2 ສັນຊາດ
  const s2=[["ສະຖິຕິແຮງງານຕ່າງປະເທດ ທີ່ເຮັດວຽກໃນເຂດເສດຖະກິດພິເສດ ປະຈຳເດືອນ "+mn+"/"+yr],[],["ລ/ດ","ສັນຊາດ","ຊາຍ","ຍິງ","ລວມ"]];
  let ni=1;Object.entries(natMap).forEach(([nat,v])=>{s2.push([ni++,nat,v.male,v.female,v.male+v.female]);});
  s2.push(["","ລວມ",fMT,fFT,fMT+fFT]);
  const ws2=XLSX.utils.aoa_to_sheet(s2);ws2["!merges"]=[{s:{r:0,c:0},e:{r:0,c:4}}];
  XLSX.utils.book_append_sheet(wb,ws2,"B.5.2 ສັນຊາດ");

  // Sheet 3: B.6.1 ລາຍເດືອນ
  const s3=[["ສະຫຼຸບລາຍເດືອນ ປີ "+yr],[],["ເດືອນ","ບໍລິສັດ","ລາວລວມ","ຕ.ປ.ລວມ","ລວມ","ຮັບໃໝ່","ອອກ"]];
  const byMonth={};S.records.forEach(r=>{const d=new Date(r.date);if(d.getFullYear()!==yr)return;const m=d.getMonth();if(!byMonth[m])byMonth[m]={};if(!byMonth[m][r.company_code]||r.date>byMonth[m][r.company_code].date)byMonth[m][r.company_code]=r;});
  let prevTotal=0;
  MONTHS.forEach((mn2,mi)=>{
    if(!byMonth[mi]){s3.push([mn2,"-","-","-","-","-","-"]);return;}
    const recs=Object.values(byMonth[mi]);const lao=recs.reduce((s,r)=>s+r.lao_total,0),for2=recs.reduce((s,r)=>s+r.foreign_total,0);const tot=lao+for2;
    const newIn=prevTotal>0?Math.max(0,tot-prevTotal):"";const left=prevTotal>0?Math.max(0,prevTotal-tot):"";

  });
  const ws3=XLSX.utils.aoa_to_sheet(s3);ws3["!merges"]=[{s:{r:0,c:0},e:{r:0,c:6}}];
  XLSX.utils.book_append_sheet(wb,ws3,"B.6 ລາຍເດືອນ");

  // Sheet 4: C.4 ແຮງງານໃໝ່
  const wNew=S.workers.filter(w=>w.type==="new");
  const s4h=["ລ/ດ","ເຂດ","ບໍລິສັດ","ເພດ","ຄຳນຳ","ຊື່","ນາມສະກຸນ","ສັນຊາດ","ຕຳແໜ່ງ","ບັດແຮງ","ໝົດ","ຄັ້ງ","Passport ໝົດ","Visa ໝົດ"];
  const s4=[[mn+" "+yr+" — ສ່ວນ C.4 ແຮງງານເຂົ້າໃໝ່"],[],s4h];
  const byZoneCoNew={};wNew.forEach(w=>{const k=w.zone+"|"+w.company_name;if(!byZoneCoNew[k])byZoneCoNew[k]=[];byZoneCoNew[k].push(w);});
  let ni4=1;
  Object.entries(byZoneCoNew).sort().forEach(([k,ws])=>{
    const f=ws.filter(w=>w.gender==="ຍິງ").sort((a,b)=>a.last_name.localeCompare(b.last_name));
    const m=ws.filter(w=>w.gender==="ຊາຍ").sort((a,b)=>a.last_name.localeCompare(b.last_name));
    [...f,...m].forEach(w=>{s4.push([ni4++,w.zone,w.company_name,w.gender,w.prefix,w.first_name,w.last_name,w.nationality,w.position,w.labour_no,w.labour_expiry,w.labour_round,w.passport_expiry,w.visa_expiry]);});
  });
  const ws4=XLSX.utils.aoa_to_sheet(s4);ws4["!merges"]=[{s:{r:0,c:0},e:{r:0,c:13}}];
  XLSX.utils.book_append_sheet(wb,ws4,"C.4 ແຮງງານໃໝ່");

  // Sheet 5: C.4 ຕໍ່ອາຍຸ
  const wRen=S.workers.filter(w=>w.type==="renew");
  const s5=[["C.4 ແຮງງານຕໍ່ອາຍຸ"],[],s4h];
  const byZoneCoRen={};wRen.forEach(w=>{const k=w.zone+"|"+w.company_name;if(!byZoneCoRen[k])byZoneCoRen[k]=[];byZoneCoRen[k].push(w);});
  let ni5=1;
  Object.entries(byZoneCoRen).sort().forEach(([k,ws])=>{
    const f=ws.filter(w=>w.gender==="ຍິງ").sort((a,b)=>a.last_name.localeCompare(b.last_name));
    const m=ws.filter(w=>w.gender==="ຊາຍ").sort((a,b)=>a.last_name.localeCompare(b.last_name));
    [...f,...m].forEach(w=>{s5.push([ni5++,w.zone,w.company_name,w.gender,w.prefix,w.first_name,w.last_name,w.nationality,w.position,w.labour_no,w.labour_expiry,w.labour_round,w.passport_expiry,w.visa_expiry]);});
  });
  const ws5=XLSX.utils.aoa_to_sheet(s5);ws5["!merges"]=[{s:{r:0,c:0},e:{r:0,c:13}}];
  XLSX.utils.book_append_sheet(wb,ws5,"C.4 ຕໍ່ອາຍຸ");

  // Sheet 6: ໃກ້ໝົດ
  const exp=S.workers.filter(w=>{const d=daysUntil(w.labour_expiry);return d!==null&&d<=30;}).sort((a,b)=>daysUntil(a.labour_expiry)-daysUntil(b.labour_expiry));
  const s6=[["ໃກ້ໝົດກຳນົດ (30 ວັນ)"],[],["ລ/ດ","ຊື່","ບໍລິສັດ","ສັນຊາດ","ບັດ ເລກທີ","ໝົດ","ເຫຼືອ","ສະຖານະ"]];
  exp.forEach((w,i)=>{const d=daysUntil(w.labour_expiry);s6.push([i+1,w.prefix+" "+w.first_name+" "+w.last_name,w.company_name,w.nationality,w.labour_no,w.labour_expiry,d,d<0?"ໝົດ":d<=15?"⚠️ ດ່ວນ":"ໃກ້ໝົດ"]);});
  if(!exp.length)s6.push(["","ບໍ່ມີ"]);
  const ws6=XLSX.utils.aoa_to_sheet(s6);ws6["!merges"]=[{s:{r:0,c:0},e:{r:0,c:7}}];
  XLSX.utils.book_append_sheet(wb,ws6,"ໃກ້ໝົດກຳນົດ");

  XLSX.writeFile(wb,"SVKSEZ_"+today()+".xlsx");
}

    tbl=`<table style="font-size:11px"><thead>
    <tr><th rowspan="2">ລ/ດ</th><th rowspan="2">ລະຫັດ</th><th rowspan="2">ຊື່ບໍລິສັດ (ລາວ)</th><th rowspan="2">ຊື່ (EN)</th><th rowspan="2">ເຂດ</th>

    <tr><th>ຊາຍ</th><th>ຍິງ</th><th>ລວມ</th><th>ຊາຍ</th><th>ຍິງ</th><th>ລວມ</th></tr></thead><tbody>
    ${arr.map((r,i)=>{const fM=(r.foreign_rows||[]).reduce((s,f)=>s+f.male,0),fF=(r.foreign_rows||[]).reduce((s,f)=>s+f.female,0);const co=S.companies[r.company_code];
    return"<tr><td style='text-align:center'>"+(i+1)+"</td><td style='font-size:9px'>"+r.company_code+"</td><td>"+r.company_name+"</td><td style='font-size:10px'>"+(co?.name_en||"")+"</td><td style='text-align:center'>"+r.zone+"</td>"
    +"<td style='text-align:center'>"+r.lao_male+"</td><td style='text-align:center'>"+r.lao_female+"</td><td style='text-align:center;font-weight:bold'>"+r.lao_total+"</td>"
    +"<td style='text-align:center'>"+fM+"</td><td style='text-align:center'>"+fF+"</td><td style='text-align:center;font-weight:bold'>"+r.foreign_total+"</td>"
    +"<td style='text-align:center;font-weight:bold'>"+r.grand_total+"</td></tr>";}).join("")}
    <tr style="font-weight:bold;background:#f0f0f0"><td colspan="5" style="text-align:center">ລວມ</td>
    <td style="text-align:center">${lMT}</td><td style="text-align:center">${lFT}</td><td style="text-align:center">${lMT+lFT}</td>
    <td style="text-align:center">${fMT}</td><td style="text-align:center">${fFT}</td><td style="text-align:center">${fMT+fFT}</td>
    <td style="text-align:center">${lMT+lFT+fMT+fFT}</td></tr>
    </tbody></table>`;
  }else{
    const tM=Object.values(natMap).reduce((s,v)=>s+v.male,0),tF=Object.values(natMap).reduce((s,v)=>s+v.female,0);
    tbl=`<table style="font-size:12px"><thead><tr><th>ລ/ດ</th><th>ສັນຊາດ</th><th>ຊາຍ</th><th>ຍິງ</th><th>ລວມ</th></tr></thead><tbody>

    <tr style="font-weight:bold;background:#f0f0f0"><td colspan="2" style="text-align:center">ລວມ</td>
    <td style="text-align:center">${tM}</td><td style="text-align:center">${tF}</td><td style="text-align:center">${tM+tF}</td></tr>

    </div>
    <div style="text-align:right;font-size:12px;margin-bottom:2px">ແຂວງສະຫວັນນະເຂດ</div>
    <div style="text-align:right;font-size:12px;margin-bottom:14px">ເຂດເສດຖະກິດພິເສດ ແຂວງສະຫວັນນະເຂດ</div>
    <div style="text-align:center;font-weight:bold;font-size:14px;margin-bottom:18px;line-height:1.6">${title}</div>

  document.getElementById("btn-cp").onclick=()=>{S.view="admin";render();};

}
